workflows:
  ios-build:
    name: Build iOS for Test
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: iOS Simulator Build
        script: |
          flutter build ios --simulator --no-codesign
    artifacts:
      - build/ios/iphonesimulator/*.app
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/flutter-apk/app-release.ipa