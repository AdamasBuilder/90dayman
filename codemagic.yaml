workflows:
  ios-simulator:
    name: Build iOS for Simulator
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        GEMINI_API_KEY: ""
        NEO4J_URI: ""
        NEO4J_PASSWORD: ""
        FIREBASE_GCM_SENDER_ID: ""
        FIREBASE_GOOGLE_APP_ID: ""
        FIREBASE_API_KEY: ""
        FIREBASE_PROJECT_ID: ""
        FIREBASE_STORAGE_BUCKET: ""
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Setup Firebase iOS
        script: |
          if [ -n "$FIREBASE_GCM_SENDER_ID" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>API_KEY</key>
	<string>'"$FIREBASE_API_KEY"'</string>
	<key>GCM_SENDER_ID</key>
	<string>'"$FIREBASE_GCM_SENDER_ID"'</string>
	<key>PLIST_VERSION</key>
	<string>1</string>
	<key>BUNDLE_ID</key>
	<string>com.stoic.uomo90</string>
	<key>PROJECT_ID</key>
	<string>'"$FIREBASE_PROJECT_ID"'</string>
	<key>STORAGE_BUCKET</key>
	<string>'"$FIREBASE_STORAGE_BUCKET"'</string>
	<key>IS_ADS_ENABLED</key>
	<false/>
	<key>IS_ANALYTICS_ENABLED</key>
	<false/>
	<key>IS_APPINVITE_ENABLED</key>
	<true/>
	<key>IS_GCM_ENABLED</key>
	<true/>
	<key>IS_SIGNIN_ENABLED</key>
	<true/>
	<key>GOOGLE_APP_ID</key>
	<string>'"$FIREBASE_GOOGLE_APP_ID"'</string>
</dict>
</plist>' > ios/Runner/GoogleService-Info.plist
          fi
      - name: iOS Simulator Build
        script: |
          flutter build ios --simulator --no-codesign
    artifacts:
      - build/ios/iphonesimulator/*.app
