<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Uomo in 90 Giorni - Mental Coach Stoico">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Uomo 90">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>Uomo in 90 Giorni</title>
</head>
<body>
  <div id="loading">
    <style>
      body {
        background-color: #1A1814;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
      }
      #loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #D4AF37;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #2D2A26;
        border-top: 4px solid #D4AF37;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <div class="spinner"></div>
    <p style="margin-top: 16px; color: #9A9285;">Caricamento...</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
